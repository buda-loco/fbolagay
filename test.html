<!-- Firebase (Firestore for lead capture) -->
<script type="module">
  window.Fer = window.Fer || {};
  Fer.fbReady = (async () => {
    const cfg = window.__FER_CONFIG;
    if (!cfg || !cfg.firebase) {
      console.error('[fer] test.config.js missing or malformed — lead capture disabled');
      return null;
    }
    const [{ initializeApp }, { getFirestore, collection, addDoc, serverTimestamp }] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'),
    ]);
    const app = initializeApp(cfg.firebase);
    const db = getFirestore(app);
    const col = (cfg.firestore && cfg.firestore.collection) || 'test_respuestas';
    Fer.fbSaveLead = async (payload) => {
      const ref = await addDoc(collection(db, col), { ...payload, createdAt: serverTimestamp() });
      return ref.id;
    };
    return Fer.fbSaveLead;
  })().catch((err) => {
    console.error('[fer] firebase init failed', err);
    return null;
  });
</script>
<style>
  :root {
    --navy: #0f1a3d;
    --navy-2: #162351;
    --lilac: #c9b0f5;
    --lilac-soft: #e4d6ff;
    --yellow: #E3EA00;
    --blue: #3a5bf0;
    --ink: #0b1330;
    --line: rgba(255,255,255,0.10);
    --muted: rgba(255,255,255,0.62);
    --muted-2: rgba(255,255,255,0.38);
    --focus: #e4d6ff;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    background: var(--navy);
    color: #fff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  button, a { touch-action: manipulation; }
  :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 4px; }

  /* ---------- PATTERN MARQUEE (right, tiled) ---------- */
  .pm-right {
    position: fixed;
    top: 0; right: 0;
    width: 240px;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
    transition: opacity 0.35s ease;
  }
  .pm-right.is-swapping { opacity: 0; }
  @media (max-width: 900px) { .pm-right { display: none; } }

  /* ---------- SHELL ---------- */
  .shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    padding: 24px clamp(20px, 5vw, 72px) 28px;
    padding-right: clamp(20px, 5vw, 260px);
  }
  @media (max-width: 900px) {
    .shell { padding-right: clamp(20px, 5vw, 72px); }
  }

  /* ---------- HEADER ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .logo-mark { display: inline-flex; align-items: center; gap: 14px; }
  .logo-mark img { height: 56px; width: auto; display: block; filter: brightness(0) invert(1); }
  .exit {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    transition: color .2s, border-color .2s;
  }
  .exit:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  .exit:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; color: #fff; }

  /* ---------- PROGRESS ---------- */
  .progress-wrap {
    position: relative;
    margin-top: 18px;
    min-height: 36px;
  }
  .progress-wrap.is-hidden { visibility: hidden; }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }
  .progress-meta .step-counter { display: inline-flex; align-items: baseline; gap: 6px; }
  .progress-meta .step-num { color: var(--lilac-soft); font-weight: 500; }
  .progress-meta .step-sep, .progress-meta .step-total { color: var(--muted-2); }
  .progress-track {
    position: relative;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    inset: 0;
    transform: scaleX(0);
    transform-origin: left center;
    background: linear-gradient(90deg, var(--lilac) 0%, var(--yellow) 100%);
    border-radius: 2px;
    transition: transform 0.55s cubic-bezier(.4,.1,.2,1);
  }

  /* ---------- STAGE ---------- */
  main.stage {
    position: relative;
    display: grid;
    grid-template-areas: "slides";
    padding: clamp(16px, 4vh, 48px) 0;
    min-height: 50vh;
  }
  .slide {
    grid-area: slides;
    width: 100%;
    max-width: 760px;
    display: grid;
    align-content: safe center;
    align-self: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(24px);
    pointer-events: none;
    transition: opacity 0.5s ease, transform 0.55s cubic-bezier(.3,.1,.2,1);
  }
  .slide.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .slide.leaving {
    opacity: 0;
    transform: translateY(-24px);
    pointer-events: none;
  }

  /* Question label (e.g. "01 → ") */
  .q-label {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--lilac);
  }
  .q-label .arrow {
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--lilac);
    position: relative;
    margin-left: 2px;
  }
  .q-label .arrow::after {
    content: "";
    position: absolute;
    right: -1px; top: -3px;
    width: 7px; height: 7px;
    border-top: 1px solid var(--lilac);
    border-right: 1px solid var(--lilac);
    transform: rotate(45deg);
  }

  h1.q-text, h1.intro-title, h1.result-title {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(36px, 4.8vw, 64px);
    line-height: 1.04;
    letter-spacing: -0.015em;
    margin: 8px 0 8px;
    text-wrap: pretty;
  }
  h1.intro-title .ital,
  h1.q-text .ital,
  h1.result-title .ital { font-style: italic; color: var(--lilac); }

  .lede {
    color: var(--muted);
    font-size: clamp(15px, 1.15vw, 18px);
    line-height: 1.55;
    margin: 0 0 12px;
    max-width: 58ch;
  }
  .lede strong { color: #fff; font-weight: 500; }

  /* ---------- OPTIONS ---------- */
  .options {
    display: grid;
    gap: 12px;
    margin-top: 14px;
    max-width: 640px;
  }
  .opt {
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    padding: 18px 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 14px;
    color: #fff;
    text-align: left;
    font: inherit;
    font-size: 16px;
    line-height: 1.4;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .15s;
  }
  .opt:hover {
    border-color: rgba(201,176,245,0.55);
    background: rgba(201,176,245,0.06);
  }
  .opt:hover .opt-key { background: var(--lilac); color: var(--ink); border-color: var(--lilac); }
  .opt:focus-visible {
    outline: none;
    border-color: var(--focus);
    box-shadow: 0 0 0 3px rgba(228,214,255,0.35);
  }
  .opt:active { transform: scale(0.995); }
  .opt.selected {
    border-color: var(--lilac);
    background: rgba(201,176,245,0.12);
  }
  .opt.selected .opt-key { background: var(--lilac); color: var(--ink); border-color: var(--lilac); }
  .opt-key {
    flex: 0 0 32px;
    height: 32px;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--muted);
    transition: background .15s, color .15s, border-color .15s;
  }
  .opt-text { flex: 1; }
  .opt .check {
    flex: 0 0 auto;
    width: 20px; height: 20px;
    opacity: 0;
    transition: opacity .2s;
    color: var(--lilac);
  }
  .opt.selected .check { opacity: 1; }

  .hint {
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted-2);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .kbd {
    display: inline-grid; place-items: center;
    min-width: 22px; height: 22px;
    padding: 0 6px;
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 5px;
    background: rgba(255,255,255,0.04);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 24px;
    border-radius: 999px;
    font-size: 15px; font-weight: 500;
    text-decoration: none;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    transition: transform .18s, background .18s, border-color .18s, box-shadow .18s;
  }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover { transform: translateY(-1px); background: #4a6bff; box-shadow: 0 6px 22px rgba(58,91,240,0.35); }
  .btn-ghost { background: transparent; color: #fff; border-color: rgba(255,255,255,0.22); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.04); }
  .btn-yellow { background: var(--yellow); color: var(--ink); }
  .btn-yellow:hover { transform: translateY(-1px); background: #eff600; }
  .btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }
  .btn svg { width: 16px; height: 16px; }

  /* ---------- FOOTER NAV ---------- */
  footer.nav {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  .nav-left, .nav-right { display: inline-flex; align-items: center; gap: 10px; }
  .icon-btn {
    display: inline-grid; place-items: center;
    width: 38px; height: 38px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .icon-btn:hover:not(:disabled) { color: #fff; border-color: rgba(255,255,255,0.3); }
  .icon-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; color: #fff; }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .icon-btn svg { width: 16px; height: 16px; }
  .nav-hint { font-size: 12px; color: var(--muted-2); letter-spacing: 0.02em; }
  .nav-hint strong { color: var(--muted); font-weight: 500; }

  /* ---------- INTRO ---------- */
  .intro-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    background: rgba(201,176,245,0.12);
    border: 1px solid rgba(201,176,245,0.28);
    border-radius: 999px;
    color: var(--lilac-soft);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    width: fit-content;
  }
  .intro-eyebrow::before { content:""; width:6px; height:6px; border-radius:50%; background: var(--lilac); }
  .intro-meta {
    display: flex; gap: 28px; flex-wrap: wrap;
    margin-top: 18px;
    color: var(--muted);
    font-size: 13px;
  }
  .intro-meta .m { display: inline-flex; align-items: center; gap: 8px; }
  .intro-meta .m svg { width: 15px; height: 15px; color: var(--lilac); }
  .intro-cta { margin-top: 28px; display: inline-flex; gap: 12px; align-items: center; }

  /* ---------- RESULT ---------- */
  .result-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--yellow);
    font-weight: 500;
  }
  .result-eyebrow .dot { width:8px; height:8px; border-radius:50%; background: var(--yellow); box-shadow: 0 0 0 4px rgba(227,234,0,0.18); }
  .perfil-desc {
    margin: 16px 0 0;
    color: #fff;
    font-size: clamp(16px, 1.2vw, 19px);
    line-height: 1.6;
    max-width: 62ch;
  }

  .patterns {
    margin-top: 20px;
    max-width: 720px;
  }
  .patterns h3 {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted-2);
    margin: 0 0 12px;
    font-weight: 500;
  }
  .pattern {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 14px 0;
    border-top: 1px solid var(--line);
  }
  .pattern:last-child { border-bottom: 1px solid var(--line); }
  .pattern .num {
    flex: 0 0 32px;
    height: 32px;
    display: grid; place-items: center;
    background: var(--yellow);
    color: var(--ink);
    font-weight: 600;
    border-radius: 8px;
    font-size: 14px;
  }
  .pattern .text { color: #fff; font-size: 15px; line-height: 1.55; }

  .result-closing {
    margin-top: 28px;
    max-width: 680px;
  }
  .result-closing p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    margin: 0 0 10px;
  }
  .result-cta { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }

  /* ---------- LEAD FORM ---------- */
  .lead {
    margin-top: 28px;
    padding: 22px 24px;
    background: rgba(201,176,245,0.06);
    border: 1px solid rgba(201,176,245,0.28);
    border-radius: 16px;
    max-width: 680px;
  }
  .lead h3 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-style: italic;
    color: var(--lilac-soft);
    font-size: clamp(22px, 2vw, 28px);
    line-height: 1.2;
    margin: 0 0 8px;
  }
  .lead p { color: var(--muted); font-size: 14px; line-height: 1.55; margin: 0 0 16px; }
  .lead-fields { display: grid; gap: 10px; }
  @media (min-width: 560px) { .lead-fields { grid-template-columns: 1fr 1fr; } }
  .lead-field { display: grid; gap: 6px; }
  .lead-field label {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted-2); font-weight: 500;
  }
  .lead-field input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: #fff;
    font: inherit;
    font-size: 15px;
    line-height: 1.4;
    transition: border-color .15s, background .15s;
  }
  .lead-field input::placeholder { color: var(--muted-2); }
  .lead-field input:hover { border-color: rgba(255,255,255,0.22); }
  .lead-field input:focus-visible {
    outline: none;
    border-color: var(--focus);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(228,214,255,0.2);
  }
  .lead-field input[aria-invalid="true"] {
    border-color: #ff7a8a;
    box-shadow: 0 0 0 3px rgba(255,122,138,0.18);
  }
  .lead-hp { position: absolute; left: -10000px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  .lead-error {
    margin-top: 10px;
    color: #ffb3bd;
    font-size: 13px;
    min-height: 1em;
  }
  .lead-submit { margin-top: 14px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lead-submit .btn[aria-busy="true"] { opacity: 0.8; pointer-events: none; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .lead-legal { font-size: 11px; color: var(--muted-2); line-height: 1.5; margin-top: 10px; }
  .lead-sent {
    margin-top: 20px;
    padding: 20px 24px;
    background: rgba(227,234,0,0.08);
    border: 1px solid rgba(227,234,0,0.28);
    border-radius: 16px;
    max-width: 680px;
  }
  .lead-sent strong { color: var(--yellow); }

  @media (max-width: 560px) {
    .shell { padding: 16px 16px 20px; }
    main.stage { padding: 20px 0; min-height: 0; }
    h1.q-text, h1.intro-title, h1.result-title { font-size: 30px; line-height: 1.08; }
    .perfil-desc { font-size: 16px; }
    .opt { padding: 14px 16px; font-size: 15px; }
    .nav-hint { display: none; }
    .lead { padding: 18px 18px; }
    .lead-field input { padding: 14px 14px; font-size: 16px; }  /* 16px prevents iOS zoom on focus */
    .lead-submit .btn { width: 100%; justify-content: center; }
    .intro-meta { gap: 14px 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
    .btn-blue:hover, .btn-yellow:hover { transform: none; }
  }

  /* ---------- LEAD ERROR STATE ---------- */
  .lead-retry {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(255,122,138,0.08);
    border: 1px solid rgba(255,122,138,0.35);
    border-radius: 10px;
    color: #ffb3bd;
    font-size: 13px;
    line-height: 1.5;
  }

  /* hide scrollbars within slides but keep scrolling */
  .slide::-webkit-scrollbar { width: 4px; }
  .slide::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<canvas class="pm-right" id="pat-right" aria-hidden="true"></canvas>

<div class="shell">

  <header>
    <a href="index.html" class="logo-mark" aria-label="Fer Bolagay" translate="no">
      <img src="assets/logo-horizontal.png" alt="Fer Bolagay" width="224" height="56" />
    </a>
    <a href="index.html" class="exit" title="Salir del test">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Salir
    </a>
  </header>

  <div class="progress-wrap is-hidden" id="progress-wrap">
    <div class="progress-meta">
      <span class="step-counter"><span class="step-num" id="step-num">01</span><span class="step-sep">/</span><span class="step-total" id="step-total">07</span></span>
      <span id="step-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <main class="stage" id="stage" aria-live="polite" aria-atomic="false">
    <!-- Slides are injected by JS -->
  </main>

  <footer class="nav" id="nav">
    <div class="nav-left">
      <button class="icon-btn" id="prev" aria-label="Anterior" disabled>
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="icon-btn" id="next" aria-label="Siguiente" disabled>
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="nav-right nav-hint">
      <span>Navegá con</span>
      <span class="kbd">↑</span>
      <span class="kbd">↓</span>
      <span>o</span>
      <span class="kbd">A</span>
      <span class="kbd">B</span>
      <span>para responder</span>
    </div>
  </footer>

</div>

<script>
(() => {
  window.Fer = window.Fer || {};
  const { QUESTIONS, PERFILES, BLOQUES, CIERRES, PRIORIDAD_BLOQUES } = Fer.data;
  const { detectarPerfil, asignarServicio, seleccionarBloques } = Fer.logic;

  // ---------- CONFIG ----------
  // Runtime values come from test.config.js (window.__FER_CONFIG).
  // Setup checklist for Fer before launch:
  //   1. In ConvertKit, create (or reuse) a Form dedicated to the F.E.R. test
  //      and update `convertkit.formId` in test.config.js. The current form
  //      (5366078) is the OLD "tablas" test form — it will add subscribers
  //      and fire its existing automation, which does NOT match the new
  //      email template in spec section 9.
  //   2. On the Subscriber level in CK, register these custom fields so the
  //      field values survive the subscribe call:
  //        perfil, perfil_nombre, servicio, bloque_1, bloque_2,
  //        respuestas, aliado, utm_source, utm_campaign, testrealizado
  //   3. Build the new email automation (Desbloqueo / Impulso) in CK using
  //      those fields as liquid tags. Trigger it on "subscribed to form".
  //   4. Firestore: deploy the rules documented in test.config.js.
  //   5. Restrict the Firebase API key in GCP Console by HTTP referrer
  //      (ferbolagay.com/*, *.ferbolagay.com/*, localhost/*).
  const CFG = window.__FER_CONFIG || {};
  const CK_FORM_ID = (CFG.convertkit && CFG.convertkit.formId) || '';
  const CK_API_KEY = (CFG.convertkit && CFG.convertkit.apiKey) || '';
  const STORAGE_KEY = 'fer_test_v1';
  const PENDING_KEY = 'fer_pending_lead_v1';
  // DNS label max is 63 chars — accepts modern TLDs like .photography, .consulting.
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[A-Za-z]{2,63}$/;
  // Per-field size caps. Firestore docs cap at 1MB total; these keep us far from that
  // and shut down the "1MB utm_source" bloat vector.
  const MAX = { name: 120, email: 254, utm: 80, referrer: 300, ua: 300, aliado: 60 };

  // ---------- UTILS ----------
  const cap = (v, n) => String(v == null ? '' : v).slice(0, n);
  // Tolerant: accepts anything matching \w . _ - : / — strips script/HTML risks.
  const safeParam = (v, n) => cap(String(v || '').replace(/[^\w.\-:/]/g, ''), n);
  const sanitizeReferrer = (raw) => {
    if (!raw) return '';
    try {
      const u = new URL(raw);
      // Drop query + hash — those can carry tokens/PII from the referring page.
      return cap(u.origin + u.pathname, MAX.referrer);
    } catch { return ''; }
  };

  function escapeHtml(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- ATTRIBUTION ----------
  // Only accept safe param values; cap lengths so a 1MB URL can't bloat Firestore.
  const urlParams = new URLSearchParams(location.search);
  const attribution = {
    aliado: safeParam(urlParams.get('id') || urlParams.get('aliado') || '', MAX.aliado),
    utm_source: safeParam(urlParams.get('utm_source'), MAX.utm),
    utm_medium: safeParam(urlParams.get('utm_medium'), MAX.utm),
    utm_campaign: safeParam(urlParams.get('utm_campaign'), MAX.utm),
    utm_term: safeParam(urlParams.get('utm_term'), MAX.utm),
    utm_content: safeParam(urlParams.get('utm_content'), MAX.utm),
    referrer: sanitizeReferrer(document.referrer),
    landing: cap(location.pathname, MAX.referrer),
  };

  // ---------- STATE ----------
  const saved = (() => {
    try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || null; }
    catch { return null; }
  })();

  const state = {
    step: saved?.step ?? 0,
    total: QUESTIONS.length,
    answers: (saved?.answers && saved.answers.length === QUESTIONS.length)
      ? saved.answers
      : new Array(QUESTIONS.length).fill(null),
    leadSent: saved?.leadSent || false,
  };

  // Module-scoped analytics flags (no global pollution).
  let trackedStart = false;
  let trackedComplete = false;
  // Tracks the most recent setTimeout scheduled by selectOption — cleared if
  // the user navigates manually before it fires (fixes the "skip a question"
  // race where fast Enter during the 320ms delay double-advances).
  let advanceTimer = null;

  function persist() {
    try {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
        step: state.step, answers: state.answers, leadSent: state.leadSent,
      }));
    } catch {}
  }

  // ---------- ANALYTICS ----------
  // Standard FB events where possible so Ads Manager can optimize for them;
  // GA4 gets custom names either way.
  function trackStart() {
    try { window.gtag && window.gtag('event', 'test_start'); } catch {}
    try { window.fbq && window.fbq('trackCustom', 'test_start'); } catch {}
  }
  function trackComplete(perfil, servicio) {
    try { window.gtag && window.gtag('event', 'test_completed', { perfil, servicio }); } catch {}
    try { window.fbq && window.fbq('track', 'CompleteRegistration', { content_category: perfil, content_name: servicio }); } catch {}
  }
  function trackLead(perfil, servicio) {
    try { window.gtag && window.gtag('event', 'lead_submitted', { perfil, servicio, value: 1, currency: 'USD' }); } catch {}
    try { window.fbq && window.fbq('track', 'Lead', { content_category: perfil, content_name: servicio, value: 1, currency: 'USD' }); } catch {}
  }

  // ---------- RENDER ----------
  const stage = document.getElementById('stage');
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');
  const stepNum = document.getElementById('step-num');
  const stepTotal = document.getElementById('step-total');
  const stepPct = document.getElementById('step-pct');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  // Sync hardcoded step total with actual data length.
  stepTotal.textContent = String(state.total).padStart(2, '0');

  function renderIntro() {
    const el = document.createElement('section');
    el.className = 'slide';
    el.dataset.slide = 'intro';
    el.innerHTML = `
      <span class="intro-eyebrow"><span translate="no">Test F.E.R.</span> · ${state.total}&nbsp;preguntas</span>
      <h1 class="intro-title">Descubrí qué <span class="ital">patrón</span> está influyendo hoy en tu relación con el dinero.</h1>
      <p class="lede">Este test no mide cuánto <strong>sabés</strong> de finanzas. Mide cómo estás <strong>decidiendo</strong> con tu dinero: desde tus emociones, tus hábitos y tu forma de actuar.</p>
      <div class="intro-meta">
        <span class="m"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>3&nbsp;minutos</span>
        <span class="m"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11H5a2 2 0 0 0-2 2v7h18v-7a2 2 0 0 0-2-2h-4"/><path d="M12 2v13"/><path d="m7 10 5 5 5-5"/></svg>${state.total}&nbsp;preguntas</span>
        <span class="m"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Resultado inmediato</span>
      </div>
      <div class="intro-cta">
        <button class="btn btn-blue" id="start-btn">
          Empezar test
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
        <span class="nav-hint"><span class="kbd">Enter</span></span>
      </div>`;
    return el;
  }

  function renderQuestion(qIndex) {
    const q = QUESTIONS[qIndex];
    const selected = state.answers[qIndex];
    const el = document.createElement('section');
    el.className = 'slide';
    el.dataset.slide = 'q' + qIndex;
    const groupLabel = 'q' + qIndex + '-label';
    el.innerHTML = `
      <span class="q-label" id="${groupLabel}">Pregunta ${String(qIndex + 1).padStart(2,'0')}<span class="arrow"></span></span>
      <h1 class="q-text">${escapeHtml(q.text)}</h1>
      <div class="options" role="radiogroup" aria-labelledby="${groupLabel}">
        ${q.options.map((o, i) => `
          <button class="opt ${selected === o.code ? 'selected' : ''}" role="radio" aria-checked="${selected === o.code ? 'true' : 'false'}" data-code="${o.code}" data-qindex="${qIndex}">
            <span class="opt-key" aria-hidden="true">${String.fromCharCode(65 + i)}</span>
            <span class="opt-text">${escapeHtml(o.text)}</span>
            <svg aria-hidden="true" class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </button>
        `).join('')}
      </div>
      <div class="hint">
        <span class="kbd">A</span><span>o</span><span class="kbd">B</span><span>para elegir · </span><span class="kbd">Enter</span><span>para continuar</span>
      </div>`;
    return el;
  }

  function renderResult() {
    const answers = state.answers.filter(Boolean);
    const perfil = detectarPerfil(answers);
    const servicio = asignarServicio(answers, perfil);
    const bloques = seleccionarBloques(answers, PRIORIDAD_BLOQUES);
    const cierre = CIERRES[servicio];
    const perfilData = PERFILES[perfil];

    const el = document.createElement('section');
    el.className = 'slide';
    el.dataset.slide = 'result';
    el.innerHTML = `
      <span class="result-eyebrow"><span class="dot"></span>Tu resultado</span>
      <h1 class="result-title">${escapeHtml(cierre.titulo)}</h1>

      <p class="perfil-desc">${escapeHtml(perfilData.texto)}</p>

      ${bloques.length ? `
      <div class="patterns">
        <h3>Tus dos patrones más fuertes</h3>
        ${bloques.map((code, i) => `
          <div class="pattern">
            <div class="num">${i + 1}</div>
            <div class="text">${escapeHtml(BLOQUES[code])}</div>
          </div>
        `).join('')}
      </div>` : ''}

      <div class="result-closing">
        ${cierre.parrafos.map(p => `<p>${escapeHtml(p)}</p>`).join('')}
      </div>

      <form class="lead" id="lead-form" novalidate>
        <h3>Recibí tu análisis completo por email</h3>
        <p>Te mando la lectura detallada de los 7 ejes y los próximos pasos según tu perfil.</p>
        <div class="lead-fields">
          <div class="lead-field">
            <label for="lead-name">Nombre</label>
            <input id="lead-name" name="name" type="text" autocomplete="given-name" required maxlength="${MAX.name}" placeholder="Tu nombre…" />
          </div>
          <div class="lead-field">
            <label for="lead-email">Email</label>
            <input id="lead-email" name="email" type="email" inputmode="email" autocomplete="email" required spellcheck="false" maxlength="${MAX.email}" placeholder="tu@email.com" />
          </div>
        </div>
        <input class="lead-hp" type="text" name="company" tabindex="-1" autocomplete="off" aria-hidden="true" />
        <div class="lead-error" id="lead-error" aria-live="polite"></div>
        <div class="lead-submit">
          <button class="btn btn-yellow" type="submit" id="lead-submit">
            <span class="lead-submit-label">Enviarme el análisis completo</span>
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
          <button class="btn btn-ghost" type="button" id="restart-btn">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
            Hacer el test otra vez
          </button>
        </div>
        <p class="lead-legal">Al enviar aceptás recibir el resultado y comunicaciones de Fer Bolagay. Podés darte de baja cuando quieras.</p>
      </form>

      <div class="lead-sent" id="lead-sent" hidden>
        <strong>¡Listo!</strong> Revisá tu email en los próximos minutos. Si no lo ves, chequeá la carpeta de spam.
        <div class="result-cta" style="margin-top:16px;">
          <a class="btn btn-yellow" href="mailto:hola@ferbolagay.com?subject=${encodeURIComponent(cierre.cta)}">
            ${escapeHtml(cierre.cta)}
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
        </div>
      </div>`;
    return el;
  }

  function buildSlide(step) {
    if (step === 0) return renderIntro();
    if (step >= 1 && step <= state.total) return renderQuestion(step - 1);
    return renderResult();
  }

  // ---------- TRANSITIONS ----------
  let current = null;
  function goTo(step) {
    if (step < 0 || step > state.total + 1) return;
    // Any manual navigation cancels a pending auto-advance so we never
    // double-advance past the user's current slide.
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    const prev = current;
    const next = buildSlide(step);
    stage.appendChild(next);

    requestAnimationFrame(() => {
      if (prev) {
        prev.classList.add('leaving');
        prev.classList.remove('active');
        setTimeout(() => prev.remove(), 550);
      }
      next.classList.add('active');
    });

    state.step = step;
    current = next;
    updateChrome();
    wireSlide(next);
    persist();
    if (state.step === 1 && !trackedStart) { trackStart(); trackedStart = true; }
    if (state.step === state.total + 1 && !trackedComplete) {
      const answers = state.answers.filter(Boolean);
      const perfil = detectarPerfil(answers);
      const servicio = asignarServicio(answers, perfil);
      trackComplete(perfil, servicio);
      trackedComplete = true;
    }
    if (typeof Fer.pmRegenerate === 'function') Fer.pmRegenerate();
  }

  function updateChrome() {
    const isQuestion = state.step >= 1 && state.step <= state.total;
    progressWrap.classList.toggle('is-hidden', !isQuestion);
    if (isQuestion) {
      const pct = (state.step / state.total) * 100;
      progressFill.style.transform = 'scaleX(' + (pct / 100) + ')';
      stepNum.textContent = String(state.step).padStart(2, '0');
      stepPct.textContent = Math.round(pct) + '%';
    }
    prevBtn.disabled = state.step <= 1;
    const canGoNext = state.step === 0
      ? true
      : isQuestion
        ? Boolean(state.answers[state.step - 1])
        : false;
    nextBtn.disabled = !canGoNext;
  }

  function wireSlide(el) {
    const slideKind = el.dataset.slide;
    if (slideKind === 'intro') {
      el.querySelector('#start-btn').addEventListener('click', () => goTo(1));
    } else if (slideKind === 'result') {
      el.querySelector('#restart-btn').addEventListener('click', () => {
        if (!confirm('¿Querés hacer el test otra vez? Se perderán tus respuestas actuales.')) return;
        state.answers = new Array(QUESTIONS.length).fill(null);
        state.leadSent = false;
        try { sessionStorage.removeItem(STORAGE_KEY); } catch {}
        trackedStart = false;
        trackedComplete = false;
        goTo(0);
      });
      wireLeadForm(el);
      if (state.leadSent) showLeadSent(el);
    } else if (slideKind && slideKind.startsWith('q')) {
      el.querySelectorAll('.opt').forEach(btn => {
        btn.addEventListener('click', () => selectOption(btn));
      });
    }
  }

  function selectOption(btn) {
    const code = btn.dataset.code;
    const qIndex = Number(btn.dataset.qindex);
    state.answers[qIndex] = code;
    const slide = btn.closest('.slide');
    slide.querySelectorAll('.opt').forEach(b => {
      const sel = b === btn;
      b.classList.toggle('selected', sel);
      b.setAttribute('aria-checked', sel ? 'true' : 'false');
    });
    updateChrome();
    if (advanceTimer) clearTimeout(advanceTimer);
    const scheduledFrom = state.step;
    advanceTimer = setTimeout(() => {
      advanceTimer = null;
      // User may have advanced manually in the meantime; only auto-advance if
      // we're still on the slide the timer was scheduled for.
      if (state.step !== scheduledFrom) return;
      if (state.step === state.total) goTo(state.total + 1);
      else goTo(state.step + 1);
    }, 320);
  }

  // ---------- LEAD CAPTURE ----------
  function showLeadSent(slide) {
    const form = slide.querySelector('#lead-form');
    const sent = slide.querySelector('#lead-sent');
    if (form) form.hidden = true;
    if (sent) sent.hidden = false;
  }

  function buildPayload(name, email) {
    const answers = state.answers.filter(Boolean);
    const perfil = detectarPerfil(answers);
    const servicio = asignarServicio(answers, perfil);
    const bloques = seleccionarBloques(answers, PRIORIDAD_BLOQUES);
    const perfilData = PERFILES[perfil];
    const cierre = CIERRES[servicio];

    const respuestasPorEje = {};
    state.answers.forEach((code, i) => { respuestasPorEje['respuesta_' + (i + 1)] = code || ''; });

    return {
      name: cap(name, MAX.name),
      // RFC 5321 allows case-sensitive localparts; in practice providers ignore
      // case. Lowercase so CK/Firestore dedupe on "User@x" vs "user@x".
      email: cap(email, MAX.email),
      perfil,
      perfil_nombre: perfilData.nombre,
      servicio,
      bloque_1_code: bloques[0] || '',
      bloque_1_text: bloques[0] ? BLOQUES[bloques[0]] : '',
      bloque_2_code: bloques[1] || '',
      bloque_2_text: bloques[1] ? BLOQUES[bloques[1]] : '',
      respuestas: answers.join(','),
      ...respuestasPorEje,
      cierre_titulo: cierre.titulo,
      cierre_cta: cierre.cta,
      ...attribution,
      user_agent: cap(navigator.userAgent, MAX.ua),
      lang: cap(navigator.language, 16),
      submitted_at: new Date().toISOString(),
    };
  }

  async function writeFirestore(payload) {
    // Await readiness so a fast submit doesn't outrun the Firebase SDK import.
    try { await Fer.fbReady; } catch {}
    if (typeof Fer.fbSaveLead !== 'function') return false;
    try {
      await Fer.fbSaveLead(payload);
      return true;
    } catch (err) {
      console.error('[lead] firestore error', err);
      return false;
    }
  }

  async function subscribeCK(payload) {
    if (!CK_FORM_ID || !CK_API_KEY) {
      console.warn('[lead] ConvertKit config missing — skipping subscribe');
      return false;
    }
    try {
      const body = new URLSearchParams({
        api_key: CK_API_KEY,
        first_name: payload.name,
        email: payload.email,
        'fields[perfil]': payload.perfil,
        'fields[perfil_nombre]': payload.perfil_nombre,
        'fields[servicio]': payload.servicio,
        'fields[bloque_1]': payload.bloque_1_text,
        'fields[bloque_2]': payload.bloque_2_text,
        'fields[respuestas]': payload.respuestas,
        'fields[aliado]': payload.aliado,
        'fields[utm_source]': payload.utm_source,
        'fields[utm_campaign]': payload.utm_campaign,
        'fields[testrealizado]': payload.submitted_at.slice(0, 10),
      });
      const res = await fetch('https://api.convertkit.com/v3/forms/' + encodeURIComponent(CK_FORM_ID) + '/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
      });
      if (!res.ok) throw new Error('CK HTTP ' + res.status);
      return true;
    } catch (err) {
      console.error('[lead] convertkit error', err);
      return false;
    }
  }

  async function submitLead(payload) {
    const [fb, ck] = await Promise.all([writeFirestore(payload), subscribeCK(payload)]);
    return { fbOk: fb === true, ckOk: ck === true };
  }

  // localStorage-backed retry queue: if both pipelines fail, we persist the
  // payload across page loads so the lead can be re-sent on the next visit or
  // via the retry button. This is what keeps leads from silently disappearing.
  function savePending(payload) {
    try { localStorage.setItem(PENDING_KEY, JSON.stringify(payload)); } catch {}
  }
  function getPending() {
    try { return JSON.parse(localStorage.getItem(PENDING_KEY)); } catch { return null; }
  }
  function clearPending() {
    try { localStorage.removeItem(PENDING_KEY); } catch {}
  }
  async function flushPending() {
    const p = getPending();
    if (!p || !p.email) return;
    const { fbOk, ckOk } = await submitLead(p);
    if (fbOk || ckOk) clearPending();
  }

  function wireLeadForm(slide) {
    const form = slide.querySelector('#lead-form');
    if (!form) return;
    const nameInput = form.querySelector('#lead-name');
    const emailInput = form.querySelector('#lead-email');
    const honeypot = form.querySelector('input[name="company"]');
    const errorEl = form.querySelector('#lead-error');
    const submitBtn = form.querySelector('#lead-submit');
    const submitLabel = submitBtn.querySelector('.lead-submit-label');

    [nameInput, emailInput].forEach(input => {
      input.addEventListener('input', () => {
        input.setAttribute('aria-invalid', 'false');
        errorEl.textContent = '';
      });
    });

    const resetButton = (labelText) => {
      submitBtn.setAttribute('aria-busy', 'false');
      submitBtn.disabled = false;
      submitLabel.textContent = labelText;
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (honeypot.value) return; // bot caught
      const name = cap(nameInput.value.trim(), MAX.name);
      const email = cap(emailInput.value.trim().toLowerCase(), MAX.email);

      if (!name) {
        nameInput.setAttribute('aria-invalid', 'true');
        errorEl.textContent = 'Ingresá tu nombre.';
        nameInput.focus();
        return;
      }
      if (!EMAIL_RE.test(email)) {
        emailInput.setAttribute('aria-invalid', 'true');
        errorEl.textContent = 'Ingresá un email válido.';
        emailInput.focus();
        return;
      }

      submitBtn.setAttribute('aria-busy', 'true');
      submitBtn.disabled = true;
      submitLabel.innerHTML = '<span class="spinner"></span> Enviando…';

      const payload = buildPayload(name, email);
      let result = { fbOk: false, ckOk: false };
      try {
        result = await submitLead(payload);
      } catch (err) {
        console.error('[lead] submit error', err);
      }

      if (result.fbOk || result.ckOk) {
        clearPending();
        state.leadSent = true;
        persist();
        trackLead(payload.perfil, payload.servicio);
        showLeadSent(slide);
        // Best-effort: if only CK landed, queue a Firestore retry for next load.
        if (!result.fbOk) savePending(payload);
      } else {
        // Both pipelines failed. Keep payload for retry.
        savePending(payload);
        errorEl.textContent = 'No pudimos enviar tu resultado. Reintentá en unos segundos.';
        resetButton('Reintentar');
      }
    });
  }

  // ---------- NAV / KEYBOARD ----------
  prevBtn.addEventListener('click', () => {
    if (state.step > 0) goTo(state.step - 1);
  });
  nextBtn.addEventListener('click', () => {
    if (nextBtn.disabled) return;
    if (state.step === 0) return goTo(1);
    if (state.step >= 1 && state.step <= state.total) {
      if (state.step === state.total) goTo(state.total + 1);
      else goTo(state.step + 1);
    }
  });

  const typingSelector = 'input, textarea, select';
  document.addEventListener('keydown', (e) => {
    // Never hijack keys while the user is typing in a form field.
    if (e.target && e.target.matches && e.target.matches(typingSelector)) return;

    if (state.step >= 1 && state.step <= state.total) {
      const q = QUESTIONS[state.step - 1];
      if (e.key === 'a' || e.key === 'A' || e.key === '1') {
        const btn = current?.querySelector('.opt[data-code="'+q.options[0].code+'"]');
        if (btn) { selectOption(btn); e.preventDefault(); }
        return;
      }
      if (e.key === 'b' || e.key === 'B' || e.key === '2') {
        const btn = current?.querySelector('.opt[data-code="'+q.options[1].code+'"]');
        if (btn) { selectOption(btn); e.preventDefault(); }
        return;
      }
    }
    if (e.key === 'Enter') {
      // If focus is on an interactive element, let its default click fire.
      if (e.target && e.target.matches && e.target.matches('button, a')) return;
      if (!nextBtn.disabled) { nextBtn.click(); e.preventDefault(); }
    } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'PageDown') {
      if (!nextBtn.disabled) { nextBtn.click(); e.preventDefault(); }
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
      if (!prevBtn.disabled) { prevBtn.click(); e.preventDefault(); }
    }
  });

  // init — resume from sessionStorage if we have partial progress
  const resumeStep = (() => {
    const s = state.step;
    if (!s || s < 0) return 0;
    if (s > state.total + 1) return state.total + 1;
    if (s === state.total + 1 && state.answers.some(a => !a)) return 0;
    if (s >= 2 && s <= state.total && state.answers.slice(0, s - 1).some(a => !a)) return 0;
    return s;
  })();
  if (resumeStep >= 1) trackedStart = true;
  if (resumeStep >= state.total + 1) trackedComplete = true;
  goTo(resumeStep);

  // Background: retry any lead that got stranded on a previous visit.
  // Runs after init so it can't block first paint.
  setTimeout(flushPending, 1500);
})();
</script>

<script>
  // --- Pattern grid (right side, static, re-randomized per slide) ---
  (function patternGrid() {
    const PALETTE = ['#E3EA00', '#D5B4FB', '#EFEEEA', '#283287', '#000000', 'rgba(255,255,255,0.1)'];
    const KINDS = ['square','square','square','quarter','quarter','half','circle','empty'];
    const QC_PATH = new Path2D('M0,0 L0,178.5 L178.5,178.5 C178.5,80 98.5,0 0,0 Z');
    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    const canvas = document.getElementById('pat-right');
    if (!canvas) return;
    let ctx, w, h, cellSize, cols, rows, strips;

    function setup() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const r = canvas.getBoundingClientRect();
      canvas.width  = Math.max(1, Math.round(r.width  * dpr));
      canvas.height = Math.max(1, Math.round(r.height * dpr));
      ctx = canvas.getContext('2d');
      ctx.setTransform(dpr,0,0,dpr,0,0);
      w = r.width; h = r.height;
    }
    function makeCell() {
      return { kind: pick(KINDS), color: pick(PALETTE), rot: pick([0,90,180,270]) };
    }
    function makeRow(n) { const row = []; for(let i=0;i<n;i++) row.push(makeCell()); return row; }
    function rebuild() {
      cols = Math.max(1, Math.round(w / 70));
      cellSize = w / cols;
      rows = Math.ceil(h / cellSize) + 1;
      strips = []; for (let i=0;i<rows;i++) strips.push(makeRow(cols));
    }
    function drawCell(cell, x, y, size) {
      if (cell.kind === 'empty') return;
      ctx.save();
      ctx.translate(x + size/2, y + size/2);
      ctx.rotate((cell.rot * Math.PI)/180);
      ctx.translate(-size/2, -size/2);
      ctx.fillStyle = cell.color;
      if (cell.kind === 'square') ctx.fillRect(0,0,size,size);
      else if (cell.kind === 'quarter') { const k = size/178.5; ctx.scale(k,k); ctx.fill(QC_PATH); }
      else if (cell.kind === 'circle') { ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.fill(); }
      else if (cell.kind === 'half') { ctx.beginPath(); ctx.arc(size/2, size, size/2, Math.PI, 0); ctx.closePath(); ctx.fill(); }
      ctx.restore();
    }
    function draw() {
      ctx.clearRect(0,0,w,h);
      for (let r=0; r<strips.length; r++) {
        const y = r * cellSize;
        const row = strips[r];
        for (let c=0; c<row.length; c++) drawCell(row[c], c*cellSize, y, cellSize);
      }
    }

    setup(); rebuild(); draw();

    // Expose: swap to a new random pattern with a gentle fade.
    window.Fer = window.Fer || {};
    let swapT;
    Fer.pmRegenerate = function () {
      if (!canvas.isConnected) return;
      canvas.classList.add('is-swapping');
      clearTimeout(swapT);
      swapT = setTimeout(() => {
        rebuild();
        draw();
        canvas.classList.remove('is-swapping');
      }, 350);
    };

    let resizeT;
    window.addEventListener('resize', () => {
      clearTimeout(resizeT);
      resizeT = setTimeout(() => { setup(); rebuild(); draw(); }, 120);
    });
  })();
</script>
